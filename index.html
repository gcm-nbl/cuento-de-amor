<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nuestro cuento de amor 💖</title>

<style>

body{
margin:0;
font-family:Georgia,serif;
text-align:center;
overflow-x:hidden;
background:linear-gradient(#6b5bff,#ff9ac2,#ffd6eb);
color:white;
}

/* estrellas */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:
radial-gradient(white 2px,transparent 2px),
radial-gradient(white 1px,transparent 1px);
background-size:50px 50px;
opacity:0.5;
pointer-events:none;
}

/* panel blanco */

.panel{
background:white;
color:#333;
width:90%;
max-width:900px;
margin:auto;
margin-top:40px;
border-radius:25px;
padding:40px;
box-shadow:0 10px 40px rgba(0,0,0,0.4);
position:relative;
}

/* botón whatsapp */

.boton-whatsapp{
position:absolute;
top:20px;
right:20px;
padding:12px 22px;
font-size:14px;
background:#ff2a72;
color:white;
border:none;
border-radius:20px;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

/* titulo */

h1{
color:#ff2a72;
font-size:40px;
}

/* contador */

.conteo{
background:linear-gradient(#ffe6f5,#ffd1ec);
border-radius:20px;
padding:25px;
margin-top:20px;
box-shadow:0 0 20px rgba(255,0,120,0.5);
}

.tiempo{
font-size:30px;
font-weight:bold;
color:#c4006b;
}

/* boton historia */

.boton{
margin-top:25px;
padding:15px 30px;
font-size:18px;
background:#ff2a72;
color:white;
border:none;
border-radius:15px;
cursor:pointer;
}

/* mensaje */

.mensaje{
margin-top:30px;
font-size:20px;
line-height:1.7;
min-height:150px;
}

/* fotos */

.fotos img{
width:200px;
border-radius:20px;
margin:10px;
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

/* lluvia */

.lluvia{
position:fixed;
top:-10px;
font-size:24px;
animation:caer 6s linear infinite;
}

@keyframes caer{
0%{transform:translateY(-100px)}
100%{transform:translateY(110vh)}
}

</style>
</head>

<body>

<div class="panel">

<button class="boton-whatsapp" onclick="mensajeWhatsApp()">
💌 PRESIÓNAME PARA CONTAR QUE TE PARECIÓ
</button>

<h1>MI PRINCESA 👑💖</h1>

<div class="conteo">

✨ LLEVAMOS ✨

<div id="contador" class="tiempo"></div>

DE ESTA HISTORIA TAN BONITA 💕

</div>

<button class="boton" onclick="iniciarHistoria()">
LEER NUESTRA HISTORIA 📖
</button>

<div id="mensaje" class="mensaje"></div>

<div class="fotos">
<img src="foto1.jpg">
<img src="foto2.jpg">
<img src="foto3.jpg">
</div>

</div>

<audio id="musica" loop>
<source src="musica.mp3" type="audio/mpeg">
</audio>

<script>

/* música */

let audio=document.getElementById("musica")

document.addEventListener("click",function(){
audio.volume=0.7
audio.play()
},{once:true})

/* contador */

let inicio=new Date("2025-12-28 11:17:33")

function contador(){

let ahora=new Date()
let dif=ahora-inicio

let dias=Math.floor(dif/(1000*60*60*24))
let horas=Math.floor((dif/(1000*60*60))%24)
let minutos=Math.floor((dif/(1000*60))%60)
let segundos=Math.floor((dif/1000)%60)

document.getElementById("contador").innerHTML=
dias+" DÍAS 💖<br>"+
horas+" HORAS 💕<br>"+
minutos+" MINUTOS 💘<br>"+
segundos+" SEGUNDOS 👑"

}

contador()
setInterval(contador,1000)

/* historia */

let texto=`

HABÍA UNA VEZ UNA PRINCESA 👑

QUE ILUMINABA TODO CON SU SONRISA ✨

UN DÍA UN PRÍNCIPE LA ENCONTRÓ

Y DESDE ESE MOMENTO SU CORAZÓN CAMBIÓ PARA SIEMPRE ❤️

NO TENÍAN UN GRAN REINO

PERO TENÍAN ALGO MUCHO MÁS VALIOSO

AMOR 💖

POCO A POCO FUERON CONSTRUYENDO

SU PROPIO CASTILLO DE SUEÑOS 🏰

UN CASTILLO HECHO DE RISAS

DE MOMENTOS

DE PROMESAS

Y DE ABRAZOS

Y EN ESE CASTILLO

EL PRÍNCIPE SOLO QUIERE UNA COSA

AMAR A SU PRINCESA TODOS LOS DÍAS 👑💖

ESA PRINCESA ERES TÚ ❤️

`

let i=0

function iniciarHistoria(){
escribir()
}

function escribir(){

if(i<texto.length){

document.getElementById("mensaje").innerHTML+=texto.charAt(i)

i++

setTimeout(escribir,40)

}

}

/* lluvia */

function lluvia(){

let emojis=["💖","🌹","💕","💘","👑"]

let e=document.createElement("div")

e.classList.add("lluvia")

e.innerHTML=emojis[Math.floor(Math.random()*emojis.length)]

e.style.left=Math.random()*100+"vw"

document.body.appendChild(e)

setTimeout(()=>{e.remove()},6000)

}

setInterval(lluvia,300)

/* whatsapp */

function mensajeWhatsApp(){

let numero="593963660301"

let mensaje="Hola amor 💖 presioné el botón de la página y quería contarte qué me pareció... 👑💖"

let url="https://wa.me/"+numero+"?text="+encodeURIComponent(mensaje)

window.open(url,"_blank")

}

</script>

</body>
</html>
